<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Kostenloses Kundenkonto für Mein Abo – Dahoam-Digital." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Konto anlegen | Dahoam-Digital</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#2D5A27" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { steirer: { DEFAULT: '#2D5A27', dark: '#1f3f1b', soft: '#e8f0e6' } },
          fontFamily: { display: ['Fraunces', 'Georgia', 'serif'], sans: ['DM Sans', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-b from-stone-100 to-stone-200/80 font-sans text-stone-800">
  <header class="border-b border-stone-200/90 bg-white/95 shadow-sm backdrop-blur-md">
    <div class="mx-auto flex max-w-3xl flex-wrap items-center justify-between gap-3 px-4 py-4 sm:px-6">
      <a href="index.html" class="font-display text-lg font-semibold text-steirer">← Dahoam-Digital</a>
      <nav class="flex flex-wrap items-center gap-4 text-sm font-medium text-stone-600">
        <a href="mein-abo.html" class="hover:text-steirer">Mein Abo</a>
        <a href="preise.html" class="hover:text-steirer">Preise</a>
        <a href="passwort-neu.html" class="hover:text-steirer">Passwort vergessen</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-md px-4 py-10 sm:px-6 sm:py-14">
    <section class="rounded-2xl border border-stone-200/90 bg-white p-8 shadow-lg ring-1 ring-stone-900/[0.04]">
      <h1 class="font-display text-xl font-semibold text-stone-900">Konto anlegen</h1>
      <p class="mt-2 text-sm text-stone-600">
        Registrierung für <strong>Mein Abo</strong> (Kundenportal). Nach der Bestätigungs-E-Mail können Sie sich anmelden. Ihr Paket tragen wir nach Vertragsabschluss in der Datenbank ein.
      </p>
      <p id="reg-config-error" class="mt-4 hidden rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-950"></p>
      <form id="reg-form" class="mt-6 space-y-4">
        <div>
          <label for="reg-email" class="block text-sm font-medium text-stone-700">E-Mail</label>
          <input id="reg-email" type="email" autocomplete="email" required class="mt-1 w-full rounded-lg border border-stone-300 px-3 py-2 text-stone-900 shadow-sm focus:border-steirer focus:outline-none focus:ring-1 focus:ring-steirer" />
        </div>
        <div>
          <label for="reg-pass" class="block text-sm font-medium text-stone-700">Passwort</label>
          <input id="reg-pass" type="password" autocomplete="new-password" required minlength="8" class="mt-1 w-full rounded-lg border border-stone-300 px-3 py-2 text-stone-900 shadow-sm focus:border-steirer focus:outline-none focus:ring-1 focus:ring-steirer" />
          <p class="mt-1 text-xs text-stone-500">Mindestens 8 Zeichen.</p>
        </div>
        <div>
          <label for="reg-pass2" class="block text-sm font-medium text-stone-700">Passwort wiederholen</label>
          <input id="reg-pass2" type="password" autocomplete="new-password" required minlength="8" class="mt-1 w-full rounded-lg border border-stone-300 px-3 py-2 text-stone-900 shadow-sm focus:border-steirer focus:outline-none focus:ring-1 focus:ring-steirer" />
        </div>
        <p id="reg-error" class="hidden text-sm text-red-600" role="alert"></p>
        <p id="reg-success" class="hidden text-sm text-green-800" role="status"></p>
        <button type="submit" class="w-full rounded-full bg-steirer py-2.5 text-sm font-semibold text-white shadow-md transition hover:bg-steirer-dark">Konto erstellen</button>
      </form>
      <p class="mt-6 text-center text-sm text-stone-600">
        Schon ein Konto? <a href="mein-abo.html" class="font-medium text-steirer underline-offset-2 hover:underline">Zur Anmeldung</a>
      </p>
    </section>
  </main>

  <script src="js/config.defaults.js"></script>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    (function () {
      var client = window.DahoamSupabase ? window.DahoamSupabase.getClient() : null;
      var cfgErr = document.getElementById('reg-config-error');
      var errEl = document.getElementById('reg-error');
      var okEl = document.getElementById('reg-success');
      var form = document.getElementById('reg-form');

      function redirectBase() {
        var o = (window.DAHOAM_SITE_ORIGIN || '').trim().replace(/\/$/, '');
        if (o) return o;
        return window.location.origin;
      }

      function showCfg(msg) {
        cfgErr.textContent = msg;
        cfgErr.classList.remove('hidden');
        form.classList.add('hidden');
      }

      if (!client) {
        var hint =
          window.DahoamSupabase && typeof window.DahoamSupabase.explainWhyNoClient === 'function'
            ? window.DahoamSupabase.explainWhyNoClient()
            : 'Konfiguration fehlt. Siehe HOSTING.txt.';
        showCfg(hint || 'Konfiguration fehlt. Siehe HOSTING.txt.');
        return;
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.classList.add('hidden');
        okEl.classList.add('hidden');
        var email = document.getElementById('reg-email').value.trim();
        var a = document.getElementById('reg-pass').value;
        var b = document.getElementById('reg-pass2').value;
        if (a !== b) {
          errEl.textContent = 'Die Passwörter stimmen nicht überein.';
          errEl.classList.remove('hidden');
          return;
        }
        if (a.length < 8) {
          errEl.textContent = 'Passwort: mindestens 8 Zeichen.';
          errEl.classList.remove('hidden');
          return;
        }
        var confirmUrl = new URL('konto-willkommen.html', redirectBase() + '/').href;
        var res = await client.auth.signUp({
          email: email,
          password: a,
          options: { emailRedirectTo: confirmUrl },
        });
        if (res.error) {
          errEl.textContent = res.error.message || 'Registrierung fehlgeschlagen.';
          errEl.classList.remove('hidden');
          return;
        }
        okEl.textContent =
          'Wenn die Registrierung aktiviert ist, erhalten Sie eine E-Mail zur Bestätigung (Spam-Ordner prüfen). Nach dem Klick auf den Link landen Sie auf einer kurzen Dankesseite und sind bereits angemeldet – danach geht es zu Mein Abo. Wenn keine E-Mail ankommt: In Supabase unter Authentication → Providers → E-Mail prüfen.';
        okEl.classList.remove('hidden');
        form.reset();
      });
    })();
  </script>
</body>
</html>
